services:
  health-coach:
    image: jannesbrunner/health-coach:1.0.0
    container_name: health-coach-bot
    restart: unless-stopped
    user: "0"
    env_file:
      - .env
    volumes:
      # Mount the data directory to persist health data and logs
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=${TIMEZONE:-Europe/Berlin}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
